[pytest]
markers =
    slow: marks tests as slow (deselect with -m "not slow")
# Archived tests are not collected by default per CLAUDE.md §14.
# Run them explicitly via `pytest tests/_archive/` if needed.
# debug/ holds scratch driver scripts (per CLAUDE.md §9 clean-room rule);
# some are named test_*.py / *_test.py and would be auto-collected by
# pytest's default discovery but are not production tests. Production
# tests live exclusively in tests/.
addopts = --ignore=tests/_archive --ignore=debug
