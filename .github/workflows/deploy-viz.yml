# GeoVac visualization site: data-integrity check + GitHub Pages deploy.
# Phase 1 of docs/visualization_plan.md (§6). The data-check job enforces the
# single-source-of-truth rule: committed viz/public/data must match a fresh
# regeneration from the geovac package (tolerant float comparison).
name: deploy-viz

on:
  push:
    branches: [main]
    paths:
      - 'viz/**'
      - 'geovac/viz_export.py'
      - '.github/workflows/deploy-viz.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install geovac + export dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . openfermion mpmath sympy pytest
      - name: Regeneration check (committed data == fresh export)
        run: pytest tests/test_viz_data_current.py --slow -q

  build-deploy:
    needs: data-check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viz/package-lock.json
      - name: Build site
        working-directory: viz
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viz/dist
      - uses: actions/deploy-pages@v4
        id: deployment
